<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — TORB</title>
  <link rel="icon" href="favicon.webp" type="image/png" />
  <link rel="apple-touch-icon" href="favicon.webp">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --accent: #ffcc00; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(8rem, 20vw, 16rem); color: var(--accent); line-height: 1; }
    p { font-size: 1.1rem; color: #aaa; margin: 1rem 0 2rem; }
    a { display: inline-block; padding: 12px 32px; background: var(--accent); color: #000; font-weight: 700; text-decoration: none; border-radius: 4px; letter-spacing: 1px; }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>Страница не найдена — но граффити здесь точно было.</p>
  <a href="/">На главную</a>
</body>
</html>
